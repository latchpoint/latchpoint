services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-alarm_db}
      POSTGRES_USER: ${POSTGRES_USER:-alarm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alarm}
      TZ: ${TZ:-UTC}
    # Force server timezone every start. Without this, Postgres only honors
    # `TZ` at initdb; existing clusters keep their original postgresql.conf
    # timezone setting (ADR-0090).
    command: ["postgres", "-c", "timezone=${TZ:-UTC}"]
    volumes:
      - db_data:/var/lib/postgresql/data

  app:
    image: ghcr.io/ljmerza/latchpoint:main
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5427:80"
    depends_on:
      - db

volumes:
  db_data:
