name: Tests

on:
  workflow_call: {}

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ljmerza/misc-actions/actions/ruff-lint@v1

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ljmerza/misc-actions/actions/eslint@v1
        with:
          working-directory: frontend

  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ljmerza/misc-actions/actions/python-test@v1
        with:
          coverage-source: accounts,alarm,control_panels,locks,notifications,scheduler
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
          codecov-flags: backend
          env-vars: |
            SECRET_KEY=ci
            DEBUG=True
            API_RESPONSE_ENVELOPE_ENABLED=True
            LOG_LEVEL=INFO
            ALLOWED_HOSTS=localhost,127.0.0.1

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ljmerza/misc-actions/actions/frontend-test@v1
        with:
          working-directory: frontend
          test-command: "npm test"
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
          codecov-flags: frontend
