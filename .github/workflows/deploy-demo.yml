name: Deploy Demo to GitHub Pages

# Triggered only when a GitHub release is published, so the demo URL is a
# stable anchor between releases instead of churning on every main commit.
# (See ADR-0089 for the demo-mode design.)
on:
  release:
    types: [published]
  # Manual escape hatch for re-deploying the latest release without cutting
  # a new tag, or for the very first deploy before any release exists.
  workflow_dispatch:

# GitHub Pages requires these permissions to publish.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one in-flight Pages deploy at a time; cancel any older one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build demo bundle
        env:
          # Repo is served from https://<owner>.github.io/<repo>/, so Vite's
          # `base` and React Router's basename both need /<repo>/.
          VITE_BASE_URL: /${{ github.event.repository.name }}/
        run: npm run build:demo

      - name: Add SPA 404 fallback
        # GitHub Pages serves 404.html on any unmatched path. Mirroring it to
        # index.html means deep URLs (e.g. /rules) work on hard refresh — the
        # SPA boots, the React Router reads the path, and the right page
        # renders. Without this, /rules → blank GitHub 404.
        run: cp dist-demo/index.html dist-demo/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist-demo

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
