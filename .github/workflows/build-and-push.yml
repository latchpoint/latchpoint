name: Build and Push Image

on:
  push:
    branches: [main]
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    permissions:
      contents: read
    uses: ljmerza/misc-actions/.github/workflows/fullstack-tests.yml@v2
    with:
      coverage-source: accounts,alarm,control_panels,locks,notifications,scheduler
      codecov-backend-flags: backend
      env-vars: |
        SECRET_KEY=ci
        DEBUG=True
        API_RESPONSE_ENVELOPE_ENABLED=True
        LOG_LEVEL=INFO
        ALLOWED_HOSTS=localhost,127.0.0.1
      frontend-working-directory: frontend
      frontend-test-command: "npm test"
      codecov-frontend-flags: frontend
    secrets: inherit

  build:
    needs: tests
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    uses: ljmerza/misc-actions/.github/workflows/docker-release.yml@v2
    with:
      image-name: ghcr.io/${{ github.repository_owner }}/latchpoint
      build-target: production
    secrets: inherit
